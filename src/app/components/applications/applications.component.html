<section id="applications" data-testid="section-applications" class="py-24 md:py-32 bg-[#F9F6F0]">
  <div class="max-w-7xl mx-auto px-6 md:px-10">
    <div appReveal class="max-w-2xl mb-14">
      <span class="eyebrow">Where it works</span>
      <h2 class="section-h2 mt-5">Built for every kind of project — across India.</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-12 gap-5">
      <article
        *ngFor="let a of apps; let i = index"
        appReveal
        [class]="'app-image-card h-[300px] md:h-[340px] ' + a.colSpan"
        [style.animation-delay]="(i * 0.08) + 's'"
        [attr.data-testid]="'application-' + i"
      >
        <img [src]="a.img" [alt]="a.title" class="absolute inset-0 w-full h-full object-cover" />
        <div class="absolute bottom-0 left-0 right-0 p-7 z-10 text-[#F9F6F0]">
          <span class="w-10 h-10 grid place-items-center bg-[#10B981] text-[#0A3B2C]">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path [attr.d]="getIconPath(a.icon)"/>
            </svg>
          </span>
          <h3 class="font-display text-2xl font-semibold mt-4">{{ a.title }}</h3>
          <p class="text-[#F9F6F0]/85 text-sm mt-1.5 leading-snug max-w-md">{{ a.body }}</p>
        </div>
      </article>
    </div>
  </div>
</section>
