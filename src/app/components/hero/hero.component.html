<section id="home" data-testid="section-hero" class="relative min-h-[100vh] flex items-end overflow-hidden">
  <img [src]="heroBg" alt="Wastewater treatment facility" class="absolute inset-0 w-full h-full object-cover" />
  <div class="absolute inset-0 bg-gradient-to-b from-[#0A3B2C]/55 via-[#0A3B2C]/40 to-[#0A3B2C]/85"></div>

  <div class="relative max-w-7xl mx-auto px-6 md:px-10 pb-20 md:pb-28 pt-40 w-full">
    <div class="max-w-4xl">
      <div appReveal class="mb-7">
        <span class="inline-flex items-center gap-2 text-[#F9F6F0]/85 text-xs uppercase tracking-[0.28em] font-semibold backdrop-blur-md bg-white/8 border border-white/15 px-4 py-2 rounded-full" data-testid="hero-badge">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
          Japanese Johkasou Technology · Pan India
        </span>
      </div>

      <h1 appReveal class="font-display text-[#F9F6F0] font-bold leading-[0.98] tracking-[-0.025em] text-5xl sm:text-6xl md:text-7xl lg:text-[5.5rem]" style="animation-delay:0.1s">
        Treat. Reuse.<br />
        <span class="text-[#10B981]">Revive Water.</span>
      </h1>

      <p appReveal class="text-[#F9F6F0]/85 text-lg md:text-xl max-w-2xl mt-7 leading-relaxed" style="animation-delay:0.2s">
        Compact, energy-efficient and CPCB-compliant decentralized sewage treatment plants — based on advanced Japanese MBBR technology, adapted for India.
      </p>

      <div appReveal class="flex flex-wrap items-center gap-4 mt-10" style="animation-delay:0.3s">
        <a [href]="mailtoUrl" data-testid="hero-cta-email" class="btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          Email Us
        </a>
        <a [href]="whatsappUrl" target="_blank" rel="noopener noreferrer" data-testid="hero-cta-whatsapp" class="btn-ghost">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
          WhatsApp
        </a>
      </div>

      <!-- Trust stats -->
      <div appReveal class="grid grid-cols-2 md:grid-cols-4 gap-6 mt-16 pt-9 border-t border-white/15 max-w-3xl" style="animation-delay:0.45s">
        <div *ngFor="let s of stats" [attr.data-testid]="'hero-stat-' + s.v">
          <div class="font-display text-3xl md:text-4xl text-[#F9F6F0] font-bold tracking-tight">{{ s.k }}</div>
          <div class="text-[#F9F6F0]/70 text-xs uppercase tracking-[0.2em] mt-1.5">{{ s.v }}</div>
        </div>
      </div>
    </div>
  </div>
</section>
