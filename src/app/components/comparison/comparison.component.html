<section data-testid="section-comparison" class="py-24 md:py-32 bg-[#F4EFE5]">
  <div class="max-w-7xl mx-auto px-6 md:px-10">
    <div appReveal class="max-w-3xl mb-12">
      <span class="eyebrow">The MBBR Difference</span>
      <h2 class="section-h2 mt-5">MBBR vs Septic Tank vs Conventional STP — at a glance.</h2>
    </div>

    <div appReveal class="overflow-x-auto bg-white border border-[#0A3B2C]/15" data-testid="comparison-table">
      <table class="w-full min-w-[640px]">
        <thead>
          <tr>
            <th class="cmp-th w-1/4">Parameter</th>
            <th class="cmp-th text-center">Septic Tank</th>
            <th class="cmp-th text-center">Conventional STP</th>
            <th class="cmp-th cmp-th-highlight text-center">Trek Enviro MBBR</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of rows">
            <td class="cmp-td font-semibold text-[#0A3B2C]">{{ row[0] }}</td>

            <td class="cmp-td text-center text-[#1B2623]/75">
              <ng-container *ngIf="isBoolean(row[1]); else textCell1">
                <span *ngIf="isTrue(row[1])" class="inline-flex w-7 h-7 items-center justify-center rounded-full bg-[#0A3B2C] text-[#F9F6F0]">
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </span>
                <span *ngIf="!isTrue(row[1])" class="inline-flex w-7 h-7 items-center justify-center rounded-full bg-[#1B2623]/10 text-[#1B2623]/55">
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </span>
              </ng-container>
              <ng-template #textCell1>{{ row[1] }}</ng-template>
            </td>

            <td class="cmp-td text-center text-[#1B2623]/75">
              <ng-container *ngIf="isBoolean(row[2]); else textCell2">
                <span *ngIf="isTrue(row[2])" class="inline-flex w-7 h-7 items-center justify-center rounded-full bg-[#0A3B2C] text-[#F9F6F0]">
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </span>
                <span *ngIf="!isTrue(row[2])" class="inline-flex w-7 h-7 items-center justify-center rounded-full bg-[#1B2623]/10 text-[#1B2623]/55">
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </span>
              </ng-container>
              <ng-template #textCell2>{{ row[2] }}</ng-template>
            </td>

            <td class="cmp-td cmp-td-highlight text-center">
              <ng-container *ngIf="isBoolean(row[3]); else textCell3">
                <span *ngIf="isTrue(row[3])" class="inline-flex w-7 h-7 items-center justify-center rounded-full bg-[#0A3B2C] text-[#F9F6F0]">
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </span>
                <span *ngIf="!isTrue(row[3])" class="inline-flex w-7 h-7 items-center justify-center rounded-full bg-[#1B2623]/10 text-[#1B2623]/55">
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </span>
              </ng-container>
              <ng-template #textCell3>{{ row[3] }}</ng-template>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
